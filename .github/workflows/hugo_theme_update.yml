name: Update Hugo modules

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  hugo-theme-update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/hugo-theme-update@c7044e7868b5cd3be772b51017a4bbdf7344c247 # v1.11.0
        with:
          git_authorship: Florian Imdahl <git@ffflorian.de>
          github_token: ${{ secrets.GITHUB_TOKEN }}
