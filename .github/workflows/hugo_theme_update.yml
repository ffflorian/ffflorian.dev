name: Update Hugo modules

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  hugo-theme-update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/hugo-theme-update@6eade066019c2982ccc3d661bdff2449b7c63434 # v1.10.2
        with:
          git_authorship: Florian Imdahl <git@ffflorian.de>
          github_token: ${{ secrets.GITHUB_TOKEN }}
