name: Update Hugo modules

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  hugo-theme-update:
    name: Hugo theme update
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/hugo-theme-update@c9a3071b2d17985d88f3bbaeab838871d9b61bdd
        with:
          git_authorship: Florian Imdahl <git@ffflorian.de>
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
