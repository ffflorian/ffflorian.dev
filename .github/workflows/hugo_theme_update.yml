name: Update Hugo modules

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  hugo-theme-update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/hugo-theme-update@395dd69a8fe27cbaaf9ee09ebfaeefaf92dfdda5 # v1.12.0
        with:
          git_authorship: Florian Imdahl <git@ffflorian.de>
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
