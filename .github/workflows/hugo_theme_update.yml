name: Update Hugo modules

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  hugo-theme-update:
    name: Hugo theme update
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/hugo-theme-update@0306941fc8c1a71a8bdaa1a2253e37f6ae707c6d
        with:
          git_authorship: Florian Imdahl <git@ffflorian.de>
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
