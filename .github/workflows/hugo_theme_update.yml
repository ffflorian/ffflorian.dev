name: Update Hugo modules

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  hugo-theme-update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/hugo-theme-update@ab77083a817e863fbd74dd2cbab57a6d27a22e28 # v1.12.0
        with:
          git_authorship: Florian Imdahl <git@ffflorian.de>
          github_token: ${{ secrets.GITHUB_TOKEN }}
