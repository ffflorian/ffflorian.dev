name: Update Hugo modules

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  hugo-theme-update:
    name: Hugo theme update
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/hugo-theme-update@468a7da06562bdb88fa18731cdb41d639f172d8e
        with:
          git_authorship: Florian Imdahl <git@ffflorian.de>
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
