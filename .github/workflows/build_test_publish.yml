name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}
jobs:
  build_publish:
    permissions:
      contents: write
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: stable

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78
        with:
          hugo-version: '0.160.0'

      - name: Build
        run: |
          hugo --minify
          touch ./public/.nojekyll

      - name: Test
        run: |
          test -f ./public/index.html || (echo 'Error: index.html was not generated by Hugo build' && exit 1)
